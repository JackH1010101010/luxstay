name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout luxstay
        uses: actions/checkout@v4
        with:
          path: luxstay

      # Also check out the main Lite-Stack repo so we can generate SEO pages
      - name: Checkout Lite-Stack (for seo-pages.js)
        uses: actions/checkout@v4
        with:
          repository: JackH1010101010/lite-stack
          path: lite-stack
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd lite-stack && npm ci --if-present || npm install || true
          npm install -g netlify-cli

      - name: Generate SEO pages for luxstay
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: lite-stack
        run: node autoresearch/seo-pages.js --site luxstay

      - name: Merge SEO pages into deploy directory
        run: |
          # Copy generated SEO pages (sitemap, robots, SEO .html pages) into luxstay dir.
          # Explicitly exclude index.html — the luxstay repo's own index.html always wins.
          find lite-stack/sites/luxstay -maxdepth 1 -name "*.html" ! -name "index.html" \
            -exec cp {} luxstay/ \;
          cp lite-stack/sites/luxstay/sitemap.xml luxstay/ 2>/dev/null || true
          cp lite-stack/sites/luxstay/robots.txt  luxstay/ 2>/dev/null || true

      - name: Inject PostHog key
        env:
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
        working-directory: luxstay
        run: |
          if [ -n "$POSTHOG_PROJECT_KEY" ]; then
            sed -i "s/YOUR_POSTHOG_KEY/${POSTHOG_PROJECT_KEY}/g" index.html
            echo "✓ PostHog key injected"
          else
            echo "⚠ POSTHOG_PROJECT_KEY not set — skipping"
          fi

      - name: Set LITEAPI_KEY env var on Netlify site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 5936d2df-a89d-4554-a5eb-1a87078450fe
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
        run: |
          if [ -n "$LITEAPI_KEY" ]; then
            netlify env:set LITEAPI_KEY "$LITEAPI_KEY" \
              --context production \
              --auth="$NETLIFY_AUTH_TOKEN"
            echo "✓ LITEAPI_KEY set on Netlify site"
          else
            echo "⚠ LITEAPI_KEY not set"
          fi

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --dir=luxstay \
            --prod \
            --site=5936d2df-a89d-4554-a5eb-1a87078450fe \
            --auth=$NETLIFY_AUTH_TOKEN
